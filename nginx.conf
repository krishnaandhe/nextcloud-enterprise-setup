# ============================================================
# Nextcloud Community Edition - Nginx Configuration
# Purpose : Private company storage on old hardware
# Notes   : Update server_name, SSL certificate paths, and PHP-FPM socket
# ============================================================

upstream php-handler {
    server unix:/run/php/php8.3-fpm.sock;
    # Example alternative:
    # server 127.0.0.1:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain-or-ip;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain-or-ip;

    root /var/www/nextcloud;
    index index.php index.html /index.php$request_uri;

    # SSL Certificates
    ssl_certificate /etc/ssl/certs/your-cert.crt;
    ssl_certificate_key /etc/ssl/private/your-key.key;

    # Recommended security headers
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS (enable only after confirming HTTPS works properly)
    # add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    client_max_body_size 2048M;
    client_body_timeout 300s;
    fastcgi_buffers 64 4K;

    gzip off;

    # Well-known URLs
    location = /.well-known/carddav {
        return 301 /remote.php/dav/;
    }

    location = /.well-known/caldav {
        return 301 /remote.php/dav/;
    }

    location /.well-known/acme-challenge {
        try_files $uri $uri/ =404;
    }

    location /.well-known/pki-validation {
        try_files $uri $uri/ =404;
    }

    # Main routing
    location / {
        rewrite ^ /index.php$request_uri;
    }

    # Deny access to sensitive paths
    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
        deny all;
    }

    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
        deny all;
    }

    # PHP handling
    location ~ \.php(?:$|/) {
        rewrite ^/(?!index|remote|public|cron|core/ajax/update|status|ocs/v1.php|ocs/v2.php|updater/.+|oc[ms]-provider/.+|.+/richdocumentscode/proxy) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;
        fastcgi_param modHeadersAvailable true;
        fastcgi_param front_controller_active true;
        fastcgi_pass php-handler;

        fastcgi_intercept_errors on;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 3600;
    }

    # Static assets
    location ~ \.(?:css|js|mjs|svg|gif|png|jpg|ico|wasm|tflite|map|ogg|flac)$ {
        try_files $uri /index.php$request_uri;
        expires 6M;
        access_log off;
    }

    location ~ \.(?:woff2?|eot|ttf|otf)$ {
        try_files $uri /index.php$request_uri;
        expires 7d;
        access_log off;
    }

    # Updater / Provider
    location ~ /(?:updater|ocs-provider)(?:$|/) {
        try_files $uri/ =404;
        index index.php;
    }

    # Block hidden and sensitive files
    location ~ /(?:\.htaccess|data|config|db_structure\.xml|README|LICENSE) {
        deny all;
    }

    access_log /var/log/nginx/nextcloud_access.log;
    error_log  /var/log/nginx/nextcloud_error.log;
}
